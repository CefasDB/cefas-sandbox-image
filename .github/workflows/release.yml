name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      cefas_version:
        description: 'CefasDB release tag to embed (or "latest")'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev \
            cpio gzip xz-utils curl

      - name: Build kernel
        run: make kernel

      - name: Build initramfs
        env:
          # The image's own tag (this repo) is independent of CefasDB's
          # release cadence. Default to `latest` from cefasdb-core unless
          # the workflow_dispatch input pins a specific tag.
          CEFAS_VERSION: ${{ github.event.inputs.cefas_version || 'latest' }}
          # PAT with contents:read on CefasDB/cefasdb-core (private).
          # Empty → image ships without the cefas binaries.
          CEFAS_TOKEN: ${{ secrets.CEFAS_CORE_READ_TOKEN }}
        run: make initramfs

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/bzImage
            out/initramfs.cpio.gz

      - name: Publish to sandbox bucket
        if: startsWith(github.ref, 'refs/tags/')
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SANDBOX_AWS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SANDBOX_AWS_SECRET }}
          AWS_DEFAULT_REGION:    us-east-1
          SANDBOX_BUCKET:        cefas-sandbox-assets
        run: make publish
